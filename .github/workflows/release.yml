name: Release

# Publishes the JS SDK to npm when a version tag is pushed (e.g. `v0.1.3`).
# Cut a release with:
#   cd js && npm version patch        # bumps package.json + creates the v<x> tag
#   git push --follow-tags
# See RELEASING.md for the full process and required secrets.
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance attestation
    defaults:
      run:
        working-directory: js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      # Run every gate before publishing — a tag should never ship unverified.
      - run: npm run typecheck
      - run: npm test
      - run: npm run smoke-test

      # Guard: the git tag must match the package.json version, so `v0.1.3`
      # can't accidentally publish 0.1.2.
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (=$TAG_VERSION) does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Tag and package.json agree on $PKG_VERSION"

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
